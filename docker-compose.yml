version: "3.8"

services:
  app:
    build:
      context: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - PORT=${PORT:-3000}
      - NODE_ENV=production
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - SCRAPLING_SIDECAR_URL=http://scrapling:5000
    depends_on:
      scrapling:
        condition: service_started
    restart: unless-stopped

  scrapling:
    build:
      context: ./scrapling-sidecar
    ports:
      - "${SIDECAR_PORT:-5000}:5000"
    environment:
      - SIDECAR_PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
